      arts: { C: ['사회와 문화','세계사','생명과학'], D: ['동아시아 역사기행','윤리와 사상','세포와 물질대사'], E: ['미술과 매체'], F: ['디자인 일반'], H: ['과학의 역사와 문화','여행지리','역사로 탐구하는 현대세계'], I: ['독서 토론과 글쓰기','심화 영어 독해와 작문'], J: ['기후변화와 지속가능한 세계','사회 문제 탐구','도시의 미래 탐구','과학의 역사와 문화'], K: ['조형'], L: ['시각 디자인'], N: ['창의 공학 설계'], O: ['생활과학 탐구'], M: ['미술 창작','미술 감상과 비평'] }
    };

    function ProgressCard({ label, value, max, danger }) {
      const pct = Math.min(100, Math.round((value / max) * 100));
      return <div className={`bg-white rounded-xl shadow-md p-5 border ${danger ? 'border-red-300' : 'border-transparent'}`}>
        <div className="flex justify-between items-end mb-3"><span className="font-semibold text-slate-700">{label}</span><span className={`font-bold ${danger ? 'text-red-600' : 'text-blue-600'}`}>{value} / {max}</span></div>
        <div className="h-3 bg-slate-200 rounded-full overflow-hidden"><div className={`h-full rounded-full transition-all duration-300 ${danger ? 'bg-red-500' : 'bg-blue-500'}`} style={{ width: `${pct}%` }} /></div>
      </div>;
    }

    function LockedSubjectCard({ s }) {
      return <div className="rounded-xl shadow-sm p-4 border bg-slate-100 border-slate-200">
        <div className="flex justify-between gap-3"><div><p className="text-sm text-slate-500">{s.semester} · {s.area}</p><h3 className="font-bold text-base">{s.name}</h3></div><span title="공통 이수 과목">🔒</span></div>
        <p className="mt-2 text-blue-600 font-bold">{s.credit}학점 · 자동 반영</p>
      </div>;
    }

    function App() {
      const [activeGrade, setActiveGrade] = useState(1);
      const [selected, setSelected] = useState(() => { try { return JSON.parse(localStorage.getItem('mm-credit-selected-v1-4')) || {}; } catch { return {}; } });
      const [query, setQuery] = useState('');
      const [toast, setToast] = useState('');

      useEffect(() => { localStorage.setItem('mm-credit-selected-v1-4', JSON.stringify(selected)); }, [selected]);
      useEffect(() => { if (toast) { const t = setTimeout(() => setToast(''), 2800); return () => clearTimeout(t); } }, [toast]);

      const selectedSubjects = useMemo(() => {
        const list = [];
        groups.forEach(group => (selected[group.id] || []).forEach(name => {
          const subjectDef = group.subjects.find(s => s.name === name);
          list.push({ name, area: subjectDef ? subjectDef.area : inferArea(name), credit: group.credit, groupId: group.id });
        }));
        return list;
      }, [selected]);

      const fixedSubjects = useMemo(() => [...firstYearSubjects, ...commonSubjects[2], ...commonSubjects[3]], []);
      const allChosenSubjects = useMemo(() => [...fixedSubjects, ...selectedSubjects], [fixedSubjects, selectedSubjects]);
      const chosenNames = useMemo(() => new Set(allChosenSubjects.map(s => s.name)), [allChosenSubjects]);

      const totals = useMemo(() => {
        const areaTotals = { 국어: 0, 수학: 0, 영어: 0, 한국사: 0, 사회: 0, 과학: 0, 체육: 0, 예술: 0, '기/정/외/한/교': 0 };
        allChosenSubjects.forEach(s => { const area = summarizeArea(s.area); areaTotals[area] = (areaTotals[area] || 0) + s.credit; });
        const rawSubjectCredit = allChosenSubjects.reduce((sum, s) => sum + s.credit, 0);
        const subjectCredit = rawSubjectCredit + FIXED_SCHOOL_CREDIT_ADJUSTMENT;
        return { areaTotals, rawSubjectCredit, subjectCredit, totalCredit: subjectCredit + REQUIREMENTS.activity, kme: areaTotals.국어 + areaTotals.수학 + areaTotals.영어 };
      }, [allChosenSubjects]);

      const areaRequirementStatus = useMemo(() => Object.entries(REQUIRED_AREA_CREDITS).map(([area, required]) => {
        const value = totals.areaTotals[area] || 0;
        return { area, value, required, met: value >= required, missing: Math.max(0, required - value) };
      }), [totals.areaTotals]);
      const missingAreaRequirements = useMemo(() => areaRequirementStatus.filter(item => !item.met), [areaRequirementStatus]);

      const hierarchyWarnings = useMemo(() => {
        return selectedSubjects.flatMap(s => {
          const missing = (hierarchy[s.name] || []).filter(p => !chosenNames.has(p));
          return missing.length ? [{ name: s.name, missing }] : [];
        });
      }, [selectedSubjects, chosenNames]);

      const getWarnings = (subjectName) => hierarchy[subjectName] || [];
      const getSelectedMissing = (subjectName) => (hierarchy[subjectName] || []).filter(p => !chosenNames.has(p));
      const hasExactDuplicateConflict = (groupId, subjectName, prev) => {
        if (groupId === 'E' && (prev.A || []).includes(subjectName)) return '그룹A에서 이미 같은 교과명을 선택했습니다. 같은 교과명은 중복 선택할 수 없습니다.';
        if (groupId === 'F' && (prev.B || []).includes(subjectName)) return '그룹B에서 이미 같은 교과명을 선택했습니다. 같은 교과명은 중복 선택할 수 없습니다.';
        if (groupId === 'A' && (prev.E || []).includes(subjectName)) return '그룹E에서 이미 같은 교과명을 선택했습니다. 같은 교과명은 중복 선택할 수 없습니다.';
        if (groupId === 'B' && (prev.F || []).includes(subjectName)) return '그룹F에서 이미 같은 교과명을 선택했습니다. 같은 교과명은 중복 선택할 수 없습니다.';
        if (groupId === 'E' && subjectName === '기하' && (prev.F || []).includes('기하')) return '그룹F에서 이미 기하를 선택했습니다. 기하는 그룹E와 F에서 중복 선택할 수 없습니다.';
        if (groupId === 'F' && subjectName === '기하' && (prev.E || []).includes('기하')) return '그룹E에서 이미 기하를 선택했습니다. 기하는 그룹E와 F에서 중복 선택할 수 없습니다.';
        if (groupId === 'K' && ['경제 수학','인공지능 수학'].includes(subjectName) && (prev.L || []).includes(subjectName)) return `그룹L에서 이미 ${subjectName}을 선택했습니다. 같은 교과목은 중복 선택할 수 없습니다.`;
        if (groupId === 'L' && ['경제 수학','인공지능 수학'].includes(subjectName) && (prev.K || []).includes(subjectName)) return `그룹K에서 이미 ${subjectName}을 선택했습니다. 같은 교과목은 중복 선택할 수 없습니다.`;
        return '';
      };

      const toggleSubject = useCallback((group, subjectName) => {
        setSelected(prev => {
          if (subjectName === ONLINE_COURSE && (group.id === 'E' || group.id === 'F')) {
            const bothSelected = (prev.E || []).includes(ONLINE_COURSE) && (prev.F || []).includes(ONLINE_COURSE);
            setToast(bothSelected ? '공동교육과정을 그룹E와 F에서 함께 해제했습니다.' : '공동교육과정은 그룹E와 F에 함께 반영됩니다.');
            return { ...prev, E: bothSelected ? [] : [ONLINE_COURSE], F: bothSelected ? [] : [ONLINE_COURSE] };
          }
          if (subjectName === ONLINE_COURSE && (group.id === 'K' || group.id === 'L')) {
            const bothSelected = (prev.K || []).includes(ONLINE_COURSE) && (prev.L || []).includes(ONLINE_COURSE);
            setToast(bothSelected ? '공동교육과정을 그룹K와 L에서 함께 해제했습니다.' : '공동교육과정은 그룹K와 L에 함께 반영됩니다.');
            return { ...prev, K: bothSelected ? [] : [ONLINE_COURSE], L: bothSelected ? [] : [ONLINE_COURSE] };
          }
          if (group.id === 'M') {
            const musicPair = ['음악과 미디어', '음악 연주와 창작'];
            const artPair = ['미술 창작', '미술 감상과 비평'];
            const pair = musicPair.includes(subjectName) ? musicPair : artPair.includes(subjectName) ? artPair : null;
            if (pair) {
              const currentM = prev.M || [];
              const pairSelected = pair.every(name => currentM.includes(name));
              setToast(pairSelected ? `${pair.join('·')}을 함께 해제했습니다.` : `${pair.join('·')}을 함께 선택했습니다.`);
              return { ...prev, M: pairSelected ? [] : pair };
            }
          }
          const current = prev[group.id] || [];
          const exists = current.includes(subjectName);
          if (!exists) {
            const conflict = hasExactDuplicateConflict(group.id, subjectName, prev);
            if (conflict) { setToast(conflict); return prev; }
            if (current.length >= group.choose) { setToast(`${group.id}그룹은 최대 ${group.choose}개까지만 선택할 수 있습니다.`); return prev; }
          }
          const next = { ...prev, [group.id]: exists ? current.filter(v => v !== subjectName) : [...current, subjectName] };
          if (!exists) {
            const missing = (hierarchy[subjectName] || []).filter(p => !new Set([...fixedSubjects.map(s => s.name), ...Object.entries(next).flatMap(([gid, names]) => names)]).has(p));
            if (missing.length) setToast(`${subjectName}: 선행 권장 과목(${missing.join(', ')}) 이수 여부를 확인하세요.`);
          }
          return next;
        });
      }, [fixedSubjects]);

      const applyPreset = (type) => {
        const next = {};
        Object.entries(presets[type]).forEach(([groupId, values]) => {
          const group = groups.find(g => g.id === groupId);
          if (!group) return;
          next[groupId] = values.filter(v => group.subjects.some(s => s.name === v)).slice(0, group.choose);
        });
        setSelected(next);
        setToast('진로 프리셋을 적용했습니다. 필요에 따라 과목을 조정하세요.');
      };
      const handleSearch = () => {
        const term = query.trim().toLowerCase();
        if (!term) {
          setToast('검색할 과목명을 입력하세요.');
          return;
        }
        const firstMatch = firstYearSubjects.find(s => s.name.toLowerCase().includes(term));
        if (firstMatch) {
          setActiveGrade(1);
          setToast(`1학년 필수 과목에서 ${firstMatch.name}을 찾았습니다.`);
          return;
        }
        for (const grade of [2, 3]) {
          const commonMatch = commonSubjects[grade].find(s => s.name.toLowerCase().includes(term));
          if (commonMatch) {
            setActiveGrade(grade);
            setToast(`${grade}학년 공통 이수 과목에서 ${commonMatch.name}을 찾았습니다.`);
            return;
          }
        }
        const groupMatch = groups.find(g => g.subjects.some(s => s.name.toLowerCase().includes(term)));
        if (groupMatch) {
          const subjectMatch = groupMatch.subjects.find(s => s.name.toLowerCase().includes(term));
          setActiveGrade(groupMatch.grade);
          setToast(`${groupMatch.grade}학년 ${groupMatch.id}그룹에서 ${subjectMatch.name}을 찾았습니다.`);
          return;
        }
        setToast('검색한 과목을 찾지 못했습니다. 띄어쓰기나 과목명을 다시 확인하세요.');
      };

      const reset = () => { setSelected({}); setToast('선택 과목을 초기화했습니다.'); };

      const saveAsPdf = () => {
        setActiveGrade('summary');
        setToast('인쇄 창이 열리면 대상/프린터에서 PDF로 저장을 선택하세요.');
        setTimeout(() => window.print(), 150);
      };

      const visibleGroups = groups.filter(g => g.grade === activeGrade);
      const normalizedQuery = query.trim().toLowerCase();
      const allGroupsComplete = groups.every(g => (selected[g.id] || []).length === g.choose);
      const missingGroups = groups.filter(g => (selected[g.id] || []).length < g.choose);
      const canGraduate = totals.subjectCredit >= REQUIREMENTS.subject && totals.totalCredit >= REQUIREMENTS.total && totals.kme <= REQUIREMENTS.kmeLimit && allGroupsComplete && hierarchyWarnings.length === 0 && missingAreaRequirements.length === 0;
      const missingSubjectCredit = Math.max(0, REQUIREMENTS.subject - totals.subjectCredit);

      const finalSelectionRows = useMemo(() => {
        const rows = [];
        firstYearSubjects.forEach(s => rows.push({ grade: 1, category: '학교 지정 필수', name: s.name, area: s.area, credit: s.credit, semester: s.semester }));
        [2, 3].forEach(grade => {
          commonSubjects[grade].forEach(s => rows.push({ grade, category: '공통 이수', name: s.name, area: s.area, credit: s.credit, semester: s.semester }));
          groups.filter(g => g.grade === grade).forEach(group => {
            (selected[group.id] || []).forEach(name => {
              const subject = group.subjects.find(s => s.name === name);
              rows.push({ grade, category: `${group.id}그룹`, name, area: subject?.area || '', credit: group.credit, semester: '-' });
            });
          });
        });
        return rows;
      }, [selected]);

      const selectedGroupSummary = useMemo(() => groups.map(group => ({
        ...group,
        selectedNames: selected[group.id] || [],
        complete: (selected[group.id] || []).length === group.choose
      })), [selected]);

      return <div className="min-h-screen pb-8">
        <header className="bg-white border-b sticky top-0 z-30">
          <div className="max-w-7xl mx-auto px-4 py-5">
            <div className="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-4">
              <div><p className="text-sm text-blue-600 font-semibold">2026학년도 입학생용 v1.8</p><h1 className="text-2xl md:text-3xl font-extrabold tracking-tight">명문고 고교학점제 학점 계산기</h1></div>
              <div className="flex flex-col sm:flex-row gap-2">
                <input value={query} onChange={e => setQuery(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') handleSearch(); }} placeholder="과목명 검색" className="px-4 py-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-blue-400 bg-slate-50" />
                <button onClick={handleSearch} className="px-4 py-3 rounded-xl bg-blue-500 text-white font-semibold hover:bg-blue-600 transition">검색</button>
                <button onClick={() => setQuery('')} className="px-4 py-3 rounded-xl bg-slate-100 text-slate-700 font-semibold hover:bg-slate-200 transition">검색 지우기</button>
                <button onClick={reset} className="px-4 py-3 rounded-xl bg-slate-800 text-white font-semibold hover:bg-slate-700 transition">초기화</button>
              </div>
            </div>
          </div>
        </header>

        <main className="max-w-7xl mx-auto px-4 py-6 space-y-6">
          <section className="grid md:grid-cols-3 gap-4"><ProgressCard label="전체 이수 학점" value={totals.totalCredit} max={REQUIREMENTS.total} /><ProgressCard label="교과 이수 학점" value={totals.subjectCredit} max={REQUIREMENTS.subject} /><ProgressCard label="국어·수학·영어 합산" value={totals.kme} max={REQUIREMENTS.kmeLimit} danger={totals.kme > REQUIREMENTS.kmeLimit} /></section>
          <section className="bg-white rounded-xl shadow-md p-4"><div className="flex flex-wrap gap-2 mb-4"><button onClick={() => applyPreset('science')} className="px-4 py-2 rounded-full bg-blue-100 text-blue-700 font-semibold hover:bg-blue-200 transition">이공계 진학 추천</button><button onClick={() => applyPreset('humanities')} className="px-4 py-2 rounded-full bg-indigo-100 text-indigo-700 font-semibold hover:bg-indigo-200 transition">인문·사회계 진학 추천</button><button onClick={() => applyPreset('arts')} className="px-4 py-2 rounded-full bg-pink-100 text-pink-700 font-semibold hover:bg-pink-200 transition">예술·체육계 진학 추천</button></div><p className="text-sm text-slate-500">프리셋은 추천 조합 예시입니다. 실제 수강신청 전에는 학교 교육과정 담당 교사의 확인이 필요합니다.</p></section>
          <section className="flex flex-wrap gap-2 bg-white rounded-xl shadow-md p-2 w-fit">
            {[1,2,3].map(grade => <button key={grade} onClick={() => setActiveGrade(grade)} className={`px-5 py-3 rounded-lg font-bold transition ${activeGrade === grade ? 'bg-blue-500 text-white shadow' : 'text-slate-600 hover:bg-slate-100'}`}>{grade}학년</button>)}
            <button onClick={() => setActiveGrade('summary')} className={`px-5 py-3 rounded-lg font-bold transition ${activeGrade === 'summary' ? 'bg-emerald-500 text-white shadow' : 'text-emerald-700 hover:bg-emerald-50'}`}>최종 선택 확인</button>
          </section>

          {activeGrade === 'summary' && <section className="space-y-5 print-section">
            <div className="bg-white rounded-xl shadow-md p-6 border border-emerald-100">
              <div className="flex flex-col md:flex-row md:items-start md:justify-between gap-4">
                <div>
                  <p className="text-sm font-semibold text-emerald-600">수강신청 전 확인용</p>
                  <h2 className="text-2xl font-extrabold mt-1">최종 선택 과목 확인서</h2>
                  <p className="text-sm text-slate-500 mt-2">아래 목록을 보고 실제 수강신청 사이트에서 같은 과목을 선택하세요. 공통 이수 과목은 자동 반영된 과목입니다.</p><p className="text-xs text-slate-400 mt-1 no-print">PDF 저장은 버튼을 누른 뒤 인쇄 창에서 ‘PDF로 저장’을 선택하면 됩니다.</p>
                </div>
                <div className="flex flex-wrap gap-2 no-print">
                  <button onClick={saveAsPdf} className="px-4 py-3 rounded-xl bg-slate-800 text-white font-semibold hover:bg-slate-700 transition">PDF로 저장 / 인쇄</button>
                  <button onClick={() => setActiveGrade(2)} className="px-4 py-3 rounded-xl bg-blue-100 text-blue-700 font-semibold hover:bg-blue-200 transition">선택 수정하기</button>
                </div>
              </div>
              {!allGroupsComplete && <div className="mt-4 rounded-xl bg-yellow-50 border border-yellow-200 p-4 text-sm text-yellow-800"><p className="font-bold">아직 선택하지 않은 그룹이 있습니다.</p><p>{missingGroups.map(g => `${g.id}그룹`).join(', ')} 선택을 완료한 뒤 최종 확인에 사용하는 것을 권장합니다.</p></div>}
              {canGraduate ? <div className="mt-4 rounded-xl bg-green-50 border border-green-200 p-4 text-sm text-green-800"><p className="font-bold">✅ 졸업 요건 기준을 충족한 선택입니다.</p><p>그래도 실제 수강신청 전에는 학교 안내와 담임·교육과정 담당 교사의 확인을 받으세요.</p></div> : <div className="mt-4 rounded-xl bg-red-50 border border-red-200 p-4 text-sm text-red-800"><p className="font-bold">❌ 확인이 필요한 항목이 있습니다.</p><p>학점 부족, 필수 이수 학점, 계열성 경고, 미선택 그룹을 아래 요약에서 다시 확인하세요.</p></div>}
            </div>

            {[1,2,3].map(grade => <div key={grade} className="bg-white rounded-xl shadow-md p-5">
              <h3 className="text-xl font-extrabold mb-3">{grade}학년 과목 목록</h3>
              <div className="overflow-x-auto">
                <table className="w-full text-sm border-separate border-spacing-y-2">
                  <thead><tr className="text-left text-slate-500"><th className="px-3 py-2">구분</th><th className="px-3 py-2">학기</th><th className="px-3 py-2">과목명</th><th className="px-3 py-2">교과군</th><th className="px-3 py-2 text-right">학점</th></tr></thead>
                  <tbody>{finalSelectionRows.filter(row => row.grade === grade).map((row, idx) => <tr key={`${grade}-${row.category}-${row.name}-${idx}`} className="bg-slate-50"><td className="px-3 py-2 rounded-l-lg font-semibold text-slate-600">{row.category}</td><td className="px-3 py-2 text-slate-500">{row.semester}</td><td className="px-3 py-2 font-bold">{row.name}</td><td className="px-3 py-2 text-slate-500">{row.area || '-'}</td><td className="px-3 py-2 rounded-r-lg text-right font-bold text-blue-600">{row.credit}</td></tr>)}</tbody>
                </table>
              </div>
            </div>)}

            <div className="bg-white rounded-xl shadow-md p-5">
              <h3 className="text-xl font-extrabold mb-3">선택 그룹 완료 현황</h3>
              <div className="grid md:grid-cols-2 xl:grid-cols-3 gap-3">{selectedGroupSummary.map(group => <div key={group.id} className={`rounded-xl border p-4 ${group.complete ? 'bg-green-50 border-green-200' : 'bg-yellow-50 border-yellow-300'}`}><div className="flex justify-between gap-3"><p className="font-extrabold">{group.id}그룹</p><span className={`text-sm font-bold ${group.complete ? 'text-green-700' : 'text-yellow-700'}`}>{group.selectedNames.length}/{group.choose}</span></div><p className="text-sm text-slate-500 mt-1">{group.title}</p><p className="mt-2 font-semibold">{group.selectedNames.length ? group.selectedNames.join(', ') : '미선택'}</p></div>)}</div>
            </div>
          </section>}

          {activeGrade === 1 && <section className="space-y-4"><h2 className="text-xl font-extrabold">1학년 학교 지정 필수 과목</h2><p className="text-sm text-slate-600">생태와 환경, 세계시민은 1학년 과목에서 제외되어 있으며 3학년 공통 이수 과목으로 반영됩니다.</p><div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">{firstYearSubjects.map(s => <LockedSubjectCard key={s.id} s={s} />)}</div></section>}

          {(activeGrade === 2 || activeGrade === 3) && <>
            <section className="bg-white rounded-xl shadow-md p-5"><h2 className="text-xl font-extrabold mb-2">{activeGrade}학년 공통 이수 선택과목</h2><p className="text-sm text-slate-500 mb-4">아래 과목은 학생들이 공통으로 듣는 과목이므로 선택하지 않아도 학점에 자동 반영됩니다.</p><div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-3">{commonSubjects[activeGrade].map(s => <LockedSubjectCard key={s.id} s={s} />)}</div></section>
            <section className="grid lg:grid-cols-2 gap-5">{visibleGroups.map(group => {
              const current = selected[group.id] || [];
              const complete = current.length === group.choose;
              const groupMatched = normalizedQuery && group.subjects.some(s => s.name.toLowerCase().includes(normalizedQuery));
              return <article key={group.id} className={`rounded-xl shadow-md bg-white p-5 border-2 ${complete ? 'border-green-300 bg-green-50/40' : 'border-yellow-300'} ${groupMatched ? 'ring-4 ring-yellow-300' : ''}`}>
                <div className="flex justify-between items-start gap-4 mb-3"><div><h2 className="font-extrabold text-lg">{group.title}</h2><p className="text-sm text-slate-500">{group.choose}개 선택 · 과목당 {group.credit}학점 · 현재 {current.length}/{group.choose}</p></div><span className={`px-3 py-1 rounded-full text-sm font-bold ${complete ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}`}>{complete ? '완료' : '선택 필요'}</span></div>
                <p className="text-sm text-orange-500 mb-3">⚠️ 표시는 선후 이수 순서 확인이 필요한 계열성 과목입니다.</p>
                {group.note && <p className="text-sm text-blue-700 bg-blue-50 border border-blue-100 rounded-lg px-3 py-2 mb-3">{group.note}</p>}
                <div className="flex flex-wrap gap-2">{group.subjects.map(subject => {
                  const isSelected = current.includes(subject.name);
                  const linkedOnlinePair = subject.name === ONLINE_COURSE ? { E: 'F', F: 'E', K: 'L', L: 'K' }[group.id] : null;
                  const pairedOnlineBlocked = linkedOnlinePair && (selected[linkedOnlinePair] || []).length > 0 && !(selected[linkedOnlinePair] || []).includes(ONLINE_COURSE);
                  const disabled = group.id !== 'M' && !isSelected && (current.length >= group.choose || pairedOnlineBlocked);
                  const hierarchyMark = getWarnings(subject.name).length > 0;
                  const missing = isSelected ? getSelectedMissing(subject.name) : [];
                  const matched = normalizedQuery && subject.name.toLowerCase().includes(normalizedQuery);
                  return <button key={subject.name} onClick={() => toggleSubject(group, subject.name)} disabled={disabled} className={`px-3 py-2 rounded-xl border text-sm font-semibold transition-all duration-200 ${isSelected ? 'bg-blue-500 text-white border-blue-500 scale-[1.02]' : disabled ? 'bg-slate-100 text-slate-400 border-slate-200 cursor-not-allowed' : 'bg-white hover:bg-blue-50 border-slate-200'} ${matched ? 'ring-4 ring-yellow-300' : ''}`}>
                    {isSelected && <span className="mr-1">✓</span>}{subject.name}{subject.area && <span className={`ml-2 text-xs ${isSelected ? 'text-blue-100' : 'text-slate-400'}`}>{subject.area}</span>}{hierarchyMark && <span className="ml-1" title={`선행 권장 과목: ${getWarnings(subject.name).join(', ')}`}>⚠️</span>}
                    {missing.length > 0 && <span className="ml-1 text-yellow-200" title={`미이수 확인 필요: ${missing.join(', ')}`}>!</span>}
                  </button>;
                })}</div>
                {['E','F','K','L'].includes(group.id) && current.includes(ONLINE_COURSE) && <div className="mt-4 rounded-lg bg-indigo-50 border border-indigo-100 p-3 text-sm text-indigo-800"><p className="font-bold">온마을 캠퍼스 · 광명 TOP교육과정 안내</p><p>공동교육과정은 학교 안팎의 다양한 교육자원을 활용해 운영되는 공동 선택 과목입니다. 온마을 캠퍼스 및 광명 TOP교육과정과 연계된 과목으로, 세부 운영 방식은 학교 안내를 확인하세요.</p></div>}
              </article>;
            })}</section>
          </>}

          {hierarchyWarnings.length > 0 && <section className="rounded-xl bg-yellow-50 border border-yellow-200 p-5"><h2 className="font-extrabold text-yellow-800 mb-2">⚠️ 계열성 과목 이수 순서 확인</h2>{hierarchyWarnings.map(w => <p key={w.name} className="text-sm text-yellow-800">{w.name}: 선행 권장 과목 {w.missing.join(', ')} 이수 여부를 확인하세요.</p>)}</section>}

          <section className="bg-white rounded-xl shadow-md p-5 space-y-4">
            <div>
              <h2 className="text-xl font-extrabold">학점 요약</h2>
              <p className="text-sm text-slate-500 mt-1">교과별 현재 이수 학점과 필수 이수 학점 가안을 함께 표시합니다.</p>
            </div>
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-5 gap-3">{areaRequirementStatus.map(({ area, value, required, met, missing }) => <div key={area} className={`rounded-lg px-3 py-3 text-center border min-w-[104px] ${met ? 'bg-green-50 border-green-200' : 'bg-yellow-50 border-yellow-300'}`}><p className="text-xs text-slate-500 whitespace-nowrap">{area}</p><p className={`font-extrabold text-lg ${met ? 'text-green-700' : 'text-yellow-700'}`}>{value} / {required}</p><p className="text-[11px] text-slate-500">{met ? '충족' : `${missing}학점 부족`}</p></div>)}</div>
            <div className="rounded-xl bg-blue-50 border border-blue-100 p-4 text-sm text-blue-800"><p className="font-bold mb-1">교과별 필수 이수 학점 가안</p><p>국어 8, 수학 8, 영어 8, 한국사 6, 사회 8, 과학 10, 체육 10, 예술 10, 기/정/외/한/교 16학점을 기준으로 표시합니다.</p></div>
            <div className={`rounded-xl p-5 ${canGraduate ? 'bg-green-50 text-green-800 border border-green-200' : 'bg-red-50 text-red-800 border border-red-200'}`}><p className="font-extrabold text-lg">{canGraduate ? '✅ 졸업 요건 충족 가능' : '❌ 졸업 요건 확인 필요'}</p><p className="text-sm mt-1">{totals.kme > REQUIREMENTS.kmeLimit ? '국어·수학·영어 합산이 81학점을 초과했습니다. ' : ''}{missingSubjectCredit > 0 ? `교과 ${missingSubjectCredit}학점이 부족합니다. ` : ''}{missingAreaRequirements.length > 0 ? `필수 이수 학점 부족: ${missingAreaRequirements.map(item => `${item.area} ${item.missing}학점`).join(', ')}. ` : ''}{missingGroups.length > 0 ? `${missingGroups.slice(0, 4).map(g => g.id).join(', ')}${missingGroups.length > 4 ? ' 외' : ''} 그룹 선택이 필요합니다. ` : '모든 선택 그룹이 채워졌습니다. '}{hierarchyWarnings.length > 0 ? `계열성 과목 ${hierarchyWarnings.length}건 확인이 필요합니다.` : ''}</p><p className="text-xs mt-2 text-slate-500">창의적 체험활동 18학점, 2·3학년 공통 이수 선택과목 43학점이 자동 반영됩니다. 필수/공통 이수 교과는 101학점이며, 선택 그룹을 모두 채우면 73학점이 더해져 교과 174학점이 됩니다. 1학년 교양은 0학점이며, 생태와 환경·세계시민은 3학년 공통 이수 과목으로 계산됩니다.</p></div>
          </section>
        </main>
        {toast && <div className="fixed top-24 left-1/2 -translate-x-1/2 z-50 bg-slate-900 text-white px-5 py-3 rounded-full shadow-lg max-w-[90vw] text-center">{toast}</div>}
      </div>;
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
